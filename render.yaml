services:
  - type: web
    name: documind-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://doku-mind-ai.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_DIM
        value: "384"
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "64"
      - key: SUMMARY_MAX_INPUT_CHARS
        value: "20000"
      - key: CHROMA_COLLECTION
        value: documind_embeddings
